<!DOCTYPE html>
<html lang="pl">
    <head>
        <meta charset="UTF-8">
        <title>Strona Pogodowa</title>
        <link rel="stylesheet" href="bbb.css">

    </head>
    <body>
        
        <main class="b">
            <div class="weather-card">
                
                <h1>⛅ Aplikacja Pogodowa</h1>
                
                <a href="https://pogoda.interia.pl/prognoza-dlugoterminowa-bialystok,cId,1197" class="test-link">
                    Strona testowa
                </a>

                <div class="search-box">
                    <input type="text" class="search-input" placeholder="Wpisz miasto...">
                    <button class="search-button">Szukaj</button>
                </div>

                <div class="weather-result">
                    <h2 class="temperature">tu bedzie temperatura</h2>
                    <h3 class="city">tu bedzie miasto</h3>
                    
                    <div class="weather-details">
                        <div class="detail">
                            <p>💨 Wiatr</p>
                            <p><strong>i tu bedzie wiatr w mieście</strong></p>
                        </div>
                        <div class="detail">
                            <p>💧 Wilgotność</p>
                            <p><strong>tu bedzie wilgotność w mieście</strong></p>
                        </div>
                    </div>
                </div>
                </div>
        </main>

    </body>
</html>
