<!DOCTYPE html>
<html lang="pl">
    <head>
        <meta charset="UTF-8">
        <title>Strona Pogodowa</title>
        <link rel="stylesheet" href="css/baza.css">
        <link rel="stylesheet" href="css/ui.css">
        <link rel="stylesheet" href="css/pogoda.css">
        <link rel="stylesheet" href="css/tlo.css">
    </head>
    <body>
        <div class="location-bar" id="location-btn">📍 Białystok</div>
        <div class="menu-icon" id="menu-btn">&#9776;</div>
            
        <div class="side-menu" id="side-menu">
            <p id="dark-mode-btn">Tryb ciemny</p>
            <p>°C / °F</p>
        </div>
        <main class="b">
            <div class="weather-card">
                
                <h1>⛅ Aplikacja Pogodowa</h1>
                
                <a href="https://pogoda.interia.pl/prognoza-dlugoterminowa-bialystok,cId,1197" class="test-link">
                    Strona testowa
                </a>

                <div class="search-box">
                    <input type="text" class="search-input" id="wyszukiwarka" placeholder="Wpisz miasto...">
                    <button class="search-button" id="przycisk">Szukaj</button>
                </div>

                <div class="weather-result">
                    
                    <h2 class="temperature" id="temperatura">--°C</h2>
                    <h3 class="city" id="miasto">Wpisz miasto</h3>
                    
                    <div class="weather-details">
                        <div class="detail">
                            <p>💨 Wiatr</p>
                            <p><strong id="wiatr">-- km/h</strong></p>
                        </div>
                        <div class="detail">
                            <p>💧 Wilgotność</p>
                            <p><strong id="wilgotnosc">-- %</strong></p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        <script>
            const przyciskMenu = document.getElementById('menu-btn');
            const ukryteMenu = document.getElementById('side-menu');
            const przyciskCiemny = document.getElementById('dark-mode-btn');

            przyciskMenu.addEventListener('click', () => {
                ukryteMenu.classList.toggle('show');
            });

            przyciskCiemny.addEventListener('click', () => {
                document.body.classList.toggle('dark-theme');
            });
        </script>

    </body>
</html>
